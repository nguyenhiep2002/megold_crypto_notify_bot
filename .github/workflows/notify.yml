name: MeGold Crypto Notification Bot

on:
  schedule:
    # 09:00 VN -> 02:00 UTC
    # 13:00 VN -> 06:00 UTC
    # 19:00 VN -> 12:00 UTC
    # 23:00 VN -> 16:00 UTC
    - cron: '0 2,6,12,16 * * *'
  workflow_dispatch: # Cho phép kích hoạt bằng tay từ giao diện GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python main.py --now
